services:
  - type: worker
    name: discord-reminder-bot
    runtime: python
    plan: starter
    region: singapore
    numInstances: 1
    buildCommand: pip install -e .
    startCommand: python -m reminder_bot.bot
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 30
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_PATH
        value: /var/data/reminders.sqlite3
      - key: TIMEZONE
        value: Asia/Tokyo
      - key: REMINDER_POLL_INTERVAL_SECONDS
        value: "30"
      - key: DISCORD_GUILD_ID
        sync: false
    disk:
      name: reminder-data
      mountPath: /var/data
      sizeGB: 1
